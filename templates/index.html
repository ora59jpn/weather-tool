<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天気情報表示 - Weather Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .weather-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .weather-card.loading {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .city-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .weather-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
            font-size: 0.95em;
            font-weight: 500;
        }

        .info-value {
            color: #333;
            font-size: 1.2em;
            font-weight: bold;
        }

        .temperature {
            color: #e74c3c;
            font-size: 1.5em;
        }

        .humidity {
            color: #3498db;
        }

        .weather-code {
            color: #f39c12;
        }

        .error-message {
            background: #fee;
            border: 2px solid #fcc;
            border-radius: 10px;
            padding: 20px;
            color: #c33;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .controls {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .timestamp {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            color: #999;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .weather-grid {
                grid-template-columns: 1fr;
            }

            .weather-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ 天気情報</h1>
            <p>複数都市の天気データをリアルタイムで表示します</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="weather-grid" id="weatherGrid"></div>

        <div class="controls">
            <button class="btn" id="refreshBtn" onclick="loadWeatherData()">🔄 更新</button>
        </div>

        <div class="timestamp" id="timestamp"></div>
    </div>

    <script>
        const weatherGrid = document.getElementById('weatherGrid');
        const errorMessage = document.getElementById('errorMessage');
        const refreshBtn = document.getElementById('refreshBtn');
        const timestampEl = document.getElementById('timestamp');

        async function loadWeatherData() {
            try {
                // ローディング状態を表示
                refreshBtn.disabled = true;
                errorMessage.classList.remove('show');
                weatherGrid.innerHTML = '';

                // 複数都市のローディングカードを表示
                for (let i = 0; i < 4; i++) {
                    weatherGrid.innerHTML += '<div class="weather-card loading"></div>';
                }

                // APIから天気データを取得
                const response = await fetch('/api/weather');
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error || 'データ取得に失敗しました');
                }

                // 天気データを表示
                displayWeatherCards(result.data);
                updateTimestamp(result.timestamp);

            } catch (error) {
                console.error('Error:', error);
                weatherGrid.innerHTML = '<div class="no-data">天気データを取得できませんでした</div>';
                showError(error.message);
            } finally {
                refreshBtn.disabled = false;
            }
        }

        function displayWeatherCards(weatherList) {
            weatherGrid.innerHTML = '';

            if (weatherList.length === 0) {
                weatherGrid.innerHTML = '<div class="no-data">天気データがありません</div>';
                return;
            }

            weatherList.forEach(weather => {
                const card = document.createElement('div');
                card.className = 'weather-card';
                card.innerHTML = `
                    <div class="city-name">${weather.city}</div>
                    <div class="weather-info">
                        <div class="info-row">
                            <span class="info-label">気温</span>
                            <span class="info-value temperature">${weather.temperature.toFixed(1)}°C</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">湿度</span>
                            <span class="info-value humidity">${weather.humidity}%</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">天気コード</span>
                            <span class="info-value weather-code">${weather.weather_code}</span>
                        </div>
                    </div>
                `;
                weatherGrid.appendChild(card);
            });
        }

        function showError(message) {
            errorMessage.textContent = '⚠️ ' + message;
            errorMessage.classList.add('show');
        }

        function updateTimestamp(timestamp) {
            const date = new Date(timestamp);
            const formatted = date.toLocaleString('ja-JP', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            timestampEl.textContent = `最終更新: ${formatted}`;
        }

        // ページロード時にデータを取得
        window.addEventListener('load', loadWeatherData);

        // 30秒ごとに自動更新
        setInterval(loadWeatherData, 30000);
    </script>
</body>
</html>
