<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天気データ JSON表示 - Weather Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            color: white;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #764ba2;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .city-section {
            margin-bottom: 30px;
        }

        .city-header {
            background: #2d2d30;
            padding: 15px;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .city-header:hover {
            background: #3d3d40;
        }

        .city-header h2 {
            font-size: 1.3em;
            margin: 0;
        }

        .toggle-icon {
            font-size: 1.2em;
            transition: transform 0.3s ease;
        }

        .toggle-icon.collapsed {
            transform: rotate(-90deg);
        }

        .json-container {
            background: #1e1e1e;
            border: 1px solid #3d3d40;
            border-radius: 5px;
            padding: 20px;
            overflow-x: auto;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            max-height: 500px;
            opacity: 1;
        }

        .json-container.collapsed {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            padding: 0;
            border: none;
        }

        pre {
            margin: 0;
            color: #ce9178;
            font-size: 0.9em;
        }

        .key {
            color: #9cdcfe;
        }

        .string {
            color: #ce9178;
        }

        .number {
            color: #b5cea8;
        }

        .boolean {
            color: #569cd6;
        }

        .null {
            color: #569cd6;
            font-style: italic;
        }

        .error {
            background: #f48771;
            color: #fff;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #3d3d40;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .timestamp {
            text-align: right;
            color: #888;
            font-size: 0.9em;
            margin-top: 20px;
        }

        .copy-btn {
            font-size: 0.8em;
            padding: 5px 10px;
            background: #3d3d40;
            color: #d4d4d4;
            margin-left: 10px;
        }

        .copy-btn:hover {
            background: #4d4d50;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #2d2d30;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.2em;
            color: #ce9178;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            header {
                padding: 20px;
            }

            header h1 {
                font-size: 1.5em;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .json-container {
                max-height: 300px;
            }

            pre {
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ 天気データ JSON表示</h1>
            <p>Open-Meteo APIから取得したJSONデータをリアルタイム表示します</p>
        </header>

        <div class="controls">
            <button onclick="fetchWeatherData()">🔄 データを取得</button>
            <button onclick="toggleAllCities()">⬇️ すべて展開/折りたたみ</button>
            <button onclick="copyAllJSON()">📋 すべてのJSONをコピー</button>
        </div>

        <div id="errorContainer"></div>
        <div id="statsContainer"></div>
        <div id="loadingContainer" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>データを取得中...</p>
        </div>

        <div id="citiesContainer"></div>
        <div class="timestamp" id="timestamp"></div>
    </div>

    <script>
        // 都市データ
        const cities = [
            { name: "東京", latitude: 35.6762, longitude: 139.6503 },
            { name: "大阪", latitude: 34.6937, longitude: 135.5023 },
            { name: "京都", latitude: 35.0116, longitude: 135.7681 },
            { name: "札幌", latitude: 43.0642, longitude: 141.3469 }
        ];

        const API_URL = "https://api.open-meteo.com/v1/forecast";
        let allWeatherData = {};
        let citiesExpanded = {};

        // 初期状態では全て展開
        cities.forEach(city => {
            citiesExpanded[city.name] = true;
        });

        // JSONをシンタックスハイライト付きで整形
        function syntaxHighlight(json) {
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                var cls = 'number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'key';
                    } else {
                        cls = 'string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'boolean';
                } else if (/null/.test(match)) {
                    cls = 'null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        // 天気データを取得
        async function fetchWeatherData() {
            const loadingContainer = document.getElementById('loadingContainer');
            const errorContainer = document.getElementById('errorContainer');
            const citiesContainer = document.getElementById('citiesContainer');

            loadingContainer.style.display = 'block';
            errorContainer.innerHTML = '';
            citiesContainer.innerHTML = '';

            try {
                allWeatherData = {};
                const fetchPromises = cities.map(city =>
                    fetch(`${API_URL}?latitude=${city.latitude}&longitude=${city.longitude}&current=temperature,weather_code,humidity&timezone=Asia/Tokyo`)
                        .then(response => {
                            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                            return response.json();
                        })
                        .then(data => {
                            allWeatherData[city.name] = data;
                        })
                        .catch(error => {
                            allWeatherData[city.name] = { error: error.message };
                        })
                );

                await Promise.all(fetchPromises);

                loadingContainer.style.display = 'none';
                displayWeatherData();
                updateTimestamp();

            } catch (error) {
                loadingContainer.style.display = 'none';
                errorContainer.innerHTML = `<div class="error">❌ エラーが発生しました: ${error.message}</div>`;
            }
        }

        // 天気データを表示
        function displayWeatherData() {
            const citiesContainer = document.getElementById('citiesContainer');
            const statsContainer = document.getElementById('statsContainer');

            citiesContainer.innerHTML = '';
            let successCount = 0;

            cities.forEach(city => {
                const data = allWeatherData[city.name];
                const isCollapsed = !citiesExpanded[city.name];

                const citySection = document.createElement('div');
                citySection.className = 'city-section';

                const header = document.createElement('div');
                header.className = 'city-header';
                header.onclick = () => toggleCity(city.name);

                const titleDiv = document.createElement('h2');
                titleDiv.textContent = city.name;

                const toggleIcon = document.createElement('span');
                toggleIcon.className = `toggle-icon ${isCollapsed ? 'collapsed' : ''}`;
                toggleIcon.textContent = '▼';

                header.appendChild(titleDiv);
                header.appendChild(toggleIcon);

                const jsonContainer = document.createElement('div');
                jsonContainer.className = `json-container ${isCollapsed ? 'collapsed' : ''}`;

                if (data.error) {
                    jsonContainer.innerHTML = `<pre>${data.error}</pre>`;
                } else {
                    successCount++;
                    const jsonStr = JSON.stringify(data, null, 2);
                    const highlighted = syntaxHighlight(jsonStr);
                    jsonContainer.innerHTML = `
                        <pre>${highlighted}</pre>
                        <button class="copy-btn" onclick="copyCityJSON('${city.name}')">📋 コピー</button>
                    `;
                }

                citySection.appendChild(header);
                citySection.appendChild(jsonContainer);
                citiesContainer.appendChild(citySection);
            });

            // 統計情報を表示
            displayStats(successCount);
        }

        // 統計情報を表示
        function displayStats(successCount) {
            const statsContainer = document.getElementById('statsContainer');
            statsContainer.innerHTML = `
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-label">✅ 取得成功</div>
                        <div class="stat-value">${successCount} / ${cities.length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">📍 都市数</div>
                        <div class="stat-value">${cities.length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">🔗 API</div>
                        <div class="stat-value">Open-Meteo</div>
                    </div>
                </div>
            `;
        }

        // 都市をトグル
        function toggleCity(cityName) {
            citiesExpanded[cityName] = !citiesExpanded[cityName];
            const containers = document.querySelectorAll('.json-container');
            const headers = document.querySelectorAll('.city-header');

            cities.forEach((city, index) => {
                if (city.name === cityName) {
                    containers[index].classList.toggle('collapsed');
                    headers[index].querySelector('.toggle-icon').classList.toggle('collapsed');
                }
            });
        }

        // すべての都市を展開/折りたたみ
        function toggleAllCities() {
            const allExpanded = cities.every(city => citiesExpanded[city.name]);

            cities.forEach(city => {
                citiesExpanded[city.name] = !allExpanded;
            });

            const containers = document.querySelectorAll('.json-container');
            const icons = document.querySelectorAll('.toggle-icon');

            containers.forEach(container => {
                container.classList.toggle('collapsed');
            });

            icons.forEach(icon => {
                icon.classList.toggle('collapsed');
            });
        }

        // 単一都市のJSONをコピー
        function copyCityJSON(cityName) {
            const data = allWeatherData[cityName];
            const jsonStr = JSON.stringify(data, null, 2);
            navigator.clipboard.writeText(jsonStr).then(() => {
                alert(`${cityName}のJSONデータをコピーしました！`);
            });
        }

        // すべてのJSONをコピー
        function copyAllJSON() {
            const allData = {};
            cities.forEach(city => {
                allData[city.name] = allWeatherData[city.name];
            });
            const jsonStr = JSON.stringify(allData, null, 2);
            navigator.clipboard.writeText(jsonStr).then(() => {
                alert('すべてのJSONデータをコピーしました！');
            });
        }

        // タイムスタンプを更新
        function updateTimestamp() {
            const timestamp = document.getElementById('timestamp');
            const now = new Date();
            const formatted = now.toLocaleString('ja-JP', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            timestamp.textContent = `最終更新: ${formatted}`;
        }

        // ページロード時にデータを取得
        window.addEventListener('load', fetchWeatherData);

        // 60秒ごとに自動更新
        setInterval(fetchWeatherData, 60000);
    </script>
</body>
</html>
